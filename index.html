<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>CET 词汇</title>
<script>if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.classList.add('dark')</script>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src data:; connect-src 'self'; media-src 'self' blob:;">
<style>
:root {
    --bg: #fff;
    --text: #000;
    --text-secondary: #888;
    --text-tertiary: #aaa;
    --border: #e0e0e0;
    --btn-bg: #fff;
    --btn-hover: #f5f5f5;
    --btn-active: #e8e8e8;
    --accent: #000;
}
.dark {
    --bg: #1a1a1a;
    --text: #e0e0e0;
    --text-secondary: #777;
    --text-tertiary: #555;
    --border: #333;
    --btn-bg: #1a1a1a;
    --btn-hover: #2a2a2a;
    --btn-active: #333;
    --accent: #e0e0e0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh; min-height: 100dvh;
    max-width: 480px; margin: 0 auto; position: relative;
    transition: background 0.2s, color 0.2s;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    touch-action: manipulation;
    -webkit-text-size-adjust: 100%;
}

.page { display: none; min-height: 100vh; min-height: 100dvh; padding-bottom: calc(70px + env(safe-area-inset-bottom, 0px)); }
.page.active { display: flex; flex-direction: column; }

.tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; display: flex;
    border-top: 1px solid var(--border); background: var(--bg); z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 20px);
}
.tab-bar.hidden { display: none; }

.tab-item {
    flex: 1; text-align: center; padding: 14px 0 12px; font-size: 13px;
    color: var(--text-secondary); cursor: pointer; border: none;
    background: transparent; font-family: inherit; outline: none; transition: color 0.15s;
}
.tab-item.active { color: var(--text); font-weight: 600; }

.theme-btn {
    position: fixed; top: 16px; right: 16px; padding: 4px 12px; font-size: 12px;
    color: var(--text-secondary); background: transparent; border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer; font-family: inherit; outline: none; z-index: 101;
}
.theme-btn:hover { background: var(--btn-hover); }

/* Home */
#home-page { justify-content: center; align-items: center; }
.home-word { font-size: 36px; font-weight: 600; margin-bottom: 8px; cursor: pointer; user-select: none; }
.home-word-detail { font-size: 14px; color: var(--text-secondary); min-height: 44px; text-align: center; max-width: 320px; line-height: 1.6; margin-bottom: 48px; }
.home-word-detail .hp { font-size: 13px; margin-top: 4px; color: var(--text-tertiary); }
.home-word-detail .hm { font-size: 15px; margin-top: 6px; }
.home-btn { display: block; width: 200px; margin: 0 auto 12px; padding: 14px 0; font-size: 17px; color: var(--text); background: var(--btn-bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-family: inherit; outline: none; transition: background 0.15s; }
.home-btn:hover { background: var(--btn-hover); }
.home-btn:active { background: var(--btn-active); }

/* Study */
#study-page { justify-content: center; align-items: center; text-align: center; padding: 0 20px 0; }
.study-top-row { position: absolute; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: center; }
.back-btn, .tts-btn, .bookmark-btn { padding: 4px 12px; font-size: 13px; color: var(--text-secondary); background: transparent; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: inherit; outline: none; }
.back-btn:hover, .tts-btn:hover, .bookmark-btn:hover { background: var(--btn-hover); }
.bookmark-btn.bookmarked { color: #e8a838; border-color: #e8a838; }
.study-word { font-size: 48px; font-weight: 600; line-height: 1.3; letter-spacing: -0.5px; cursor: pointer; user-select: none; }
.study-phonetic { font-size: 15px; color: var(--text-tertiary); margin-top: 6px; min-height: 22px; }
.study-pos { font-size: 16px; color: var(--text-secondary); margin-top: 12px; }
.study-meaning { font-size: 20px; line-height: 1.7; margin-top: 20px; max-width: 400px; }
.study-btn-row { display: flex; gap: 10px; margin-top: 48px; justify-content: center; }
.study-btn { padding: 10px 32px; font-size: 16px; color: var(--text); background: var(--btn-bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-family: inherit; outline: none; transition: background 0.15s; }
.study-btn:hover { background: var(--btn-hover); }
.study-btn:active { background: var(--btn-active); }

.heart-btn {
    padding: 0; width: 44px; height: 44px; border-radius: 50%;
    font-size: 22px; line-height: 44px; text-align: center;
    background: var(--btn-bg); color: var(--text-secondary);
    border: 1px solid var(--border); cursor: pointer; outline: none;
    transition: color 0.2s, border-color 0.2s, transform 0.15s;
    flex-shrink: 0;
}
.heart-btn:active { transform: scale(0.9); }
.heart-btn.fav { color: #e53e3e; border-color: #e53e3e; }
@keyframes heartPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.35); }
    100% { transform: scale(1); }
}
.heart-btn.pop { animation: heartPop 0.35s ease; }

@keyframes bump { 0% { transform: scale(1); } 30% { transform: scale(0.96); } 100% { transform: scale(1); } }
.bump { animation: bump 0.15s ease-out; }

/* My */
#my-page { padding: 24px 20px; overflow-y: auto; }
.my-username { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.my-title { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.stat-item { padding: 16px; background: var(--btn-hover); border-radius: 8px; text-align: center; }
.stat-num { font-size: 28px; font-weight: 600; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.stat-item.done { background: var(--btn-active); }
.stat-item.done .stat-num { color: var(--accent); }
.stat-item.done .stat-label { color: var(--text); }
.progress-section { margin-bottom: 20px; }
.progress-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.progress-bar { height: 6px; background: var(--btn-hover); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.section-title { font-size: 15px; font-weight: 600; margin: 28px 0 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.section-title .arrow { font-size: 16px; color: var(--text-tertiary); font-weight: 400; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
.cal-day-label { font-size: 11px; color: var(--text-tertiary); padding: 4px 0; }
.cal-day { font-size: 12px; padding: 6px 0; border-radius: 4px; color: var(--text-secondary); }
.cal-day.checked { background: var(--accent); color: var(--bg); }
.cal-day.today { font-weight: 600; color: var(--text); }
.cal-day.today.checked { color: var(--bg); }
.settings-btn { margin-top: 28px; margin-right: 10px; padding: 8px 20px; font-size: 14px; color: var(--text-secondary); background: transparent; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-family: inherit; outline: none; }
.settings-btn:hover { background: var(--btn-hover); }
.bookmark-list { margin-top: 12px; }
.bookmark-word { display: inline-block; margin: 4px; padding: 4px 12px; font-size: 13px; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 14px; }

/* Full calendar modal */
.cal-modal-overlay, .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 200; align-items: center; justify-content: center; }
.cal-modal-overlay.show, .modal-overlay.show { display: flex; }
.cal-modal { background: var(--bg); border-radius: 12px; padding: 24px 20px; width: 320px; text-align: center; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; font-size: 16px; font-weight: 600; }
.cal-nav-btn { width: 32px; height: 32px; font-size: 16px; color: var(--text-secondary); background: transparent; border: 1px solid var(--border); border-radius: 50%; cursor: pointer; font-family: inherit; outline: none; display: flex; align-items: center; justify-content: center; }
.cal-nav-btn:hover { background: var(--btn-hover); }
.cal-full-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
.cal-full-label { font-size: 11px; color: var(--text-tertiary); padding: 4px 0; margin-bottom: 4px; }
.cal-full-day { font-size: 13px; padding: 8px 0; border-radius: 4px; color: var(--text-secondary); }
.cal-full-day.checked { background: var(--accent); color: var(--bg); }
.cal-full-day.today { font-weight: 600; color: var(--text); }
.cal-full-day.today.checked { color: var(--bg); }
.cal-full-day.other-month { color: transparent; }

/* Modal */
.modal { background: var(--bg); border-radius: 12px; padding: 24px; width: 300px; text-align: center; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.modal-option { display: block; width: 100%; padding: 12px; margin-bottom: 8px; font-size: 14px; color: var(--text); background: var(--btn-bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-family: inherit; outline: none; transition: background 0.15s; }
.modal-option:hover { background: var(--btn-hover); }
.modal-option.selected { border-color: var(--accent); }
.modal-close { margin-top: 16px; font-size: 13px; color: var(--text-secondary); background: none; border: none; cursor: pointer; font-family: inherit; outline: none; }
.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.toggle-row .toggle-label { font-size: 14px; }
.toggle-switch { width: 48px; height: 28px; background: var(--border); border-radius: 14px; position: relative; cursor: pointer; transition: background 0.2s; border: none; outline: none; }
.toggle-switch.on { background: var(--accent); }
.toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.toggle-switch.on::after { transform: translateX(20px); }

/* Goal picker - 3 visible options, fade edges */
.goal-picker { margin: 16px 0; }
.goal-label-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px; padding: 0 4px; }
.goal-picker-container {
    position: relative; height: 150px; overflow: hidden;
    user-select: none; touch-action: pan-y; cursor: grab;
}
.goal-picker-container:active { cursor: grabbing; }
.goal-picker-container::before,
.goal-picker-container::after {
    content: ''; position: absolute; left: 0; right: 0; height: 50px; z-index: 2; pointer-events: none;
}
.goal-picker-container::before {
    top: 0;
    background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
}
.goal-picker-container::after {
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
}
.goal-picker-highlight {
    position: absolute; top: 50px; left: 0; right: 0; height: 50px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    z-index: 1; pointer-events: none;
}
.goal-options { position: absolute; top: 0; left: 0; right: 0; transition: transform 0.3s cubic-bezier(0.23,1,0.32,1); }
.goal-option { height: 50px; line-height: 50px; text-align: center; font-size: 18px; color: var(--text-tertiary); }
.goal-option.active { color: var(--text); font-weight: 600; font-size: 22px; }

/* Username input */
.username-input {
    width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 16px; text-align: center; background: var(--bg); color: var(--text);
    outline: none; font-family: inherit;
}
.username-input:focus { border-color: var(--accent); }

/* Completion modal */
.complete-icon { font-size: 48px; margin-bottom: 12px; }
.complete-text { font-size: 16px; margin-bottom: 8px; }
.complete-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }

.loading-spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 300; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; font-size: 14px; color: var(--text-secondary); }
.home-word.loading { font-size: 22px; color: var(--text-tertiary); }
</style>
</head>
<body>

<div class="modal-overlay" id="usernameModal">
    <div class="modal">
        <div class="modal-title">欢迎使用 CET 词汇</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">请输入您的用户名（中文或英文，2-10个字符）</div>
        <input type="text" class="username-input" id="usernameInput" maxlength="10" placeholder="请输入用户名" autocomplete="off">

</div>

<div class="modal-overlay" id="bankSelectModal">

        <div class="modal-title">选择词库</div>

</div>

<div class="modal-overlay" id="goalModal">

            <div class="goal-label-row"><span>10</span><span>300</span></div>

<div class="modal-overlay" id="settingsModal">

<div class="cal-modal-overlay" id="calModalOverlay">

</div>

<div class="modal-overlay" id="completeModal">
    <div class="modal">
        <div class="complete-icon">&#127942;</div>
        <div class="complete-text" id="completeText">完成一轮！</div>
        <div class="complete-sub" id="completeSub"></div>
        <button class="modal-close" id="completeClose">继续</button>

</div>

<div class="page active" id="home-page">
    <div class="loading-overlay" id="loadingOverlay"><span class="loading-spinner"></span>词库加载中...</div>
    <div class="home-word" id="homeWord"></div>
    <div class="home-word-detail" id="homeDetail"></div>

<script>
(function(){
var BANKS={cet4:{name:'四级核心词汇',file:'words_cet4.json'},cet6:{name:'六级核心词汇',file:'words_cet6.json'}};
var currentBank='cet4',pendingBank=null;
var words=[],ordered=[],index=0,shuffled=[],studyMode='order',homeWordIndex=0;
var TOTAL=0,bookmarkWords=[],isInitialized=false,migrationNeeded=false,migrateKey=false;
var DB_NAME='cet4_study',DB_VERSION=3,db;

function escapeHTML(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
var wordIndex=null;
function buildWordIndex(){wordIndex={};for(var i=0;i<words.length;i++)wordIndex[words[i].word]=words[i]}

function defaultData(){return{today:'',todaySwiped:0,totalSwiped:0,rounds:0,streakDays:0,checkInDates:[],orderSwiped:0,shuffleSwiped:0,bookmarks:[],progress:{orderIndex:0,shuffleIndex:0,shuffleOrder:[]}}}
function defaultSettings(){return{trackMode:'both',dailyGoal:50,ttsEnabled:true,goalSet:false,theme:'light'}}

function todayStr(){return new Date().toISOString().slice(0,10)}

// === IndexedDB ===
function openDB(){
    return new Promise(function(resolve,reject){
        var req=indexedDB.open(DB_NAME,DB_VERSION);
        req.onupgradeneeded=function(e){
            var d=e.target.result;
            if(!d.objectStoreNames.contains('profile'))d.createObjectStore('profile',{keyPath:'key'});
            if(!d.objectStoreNames.contains('data'))d.createObjectStore('data',{keyPath:'key'});
            if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});
            if(e.oldVersion<2)migrationNeeded=true;
            if(e.oldVersion<3)migrateKey=true;
        };
        req.onsuccess=function(e){db=e.target.result;resolve(db)};
        req.onerror=function(e){console.warn('DB open failed');reject(e)};
    });
}

function dbGet(store,key){
    return new Promise(function(resolve){
        var tx=db.transaction(store,'readonly'),s=tx.objectStore(store),req=s.get(key);
        req.onsuccess=function(){resolve(req.result?req.result.value:null)};
        req.onerror=function(e){console.warn('DB read failed:',store,key);resolve(null)};
    });
}

function dbPut(store,key,value){
    return new Promise(function(resolve,reject){
        var tx=db.transaction(store,'readwrite'),s=tx.objectStore(store);
        s.put({key:key,value:value});
        tx.oncomplete=function(){resolve()};
        tx.onerror=function(e){console.warn('DB write failed:',store,key);reject(e)};
    });
}

async function checkNewDay(){
    var t=todayStr();
    if(data.today!==t){
        data.today=t;data.todaySwiped=0;
        await saveData();
    }
}

async function onGoalMet(){
    var t=todayStr();
    if(data.checkInDates.indexOf(t)===-1){
        data.checkInDates.push(t);
        if(data.checkInDates.length>365)data.checkInDates.shift();
        var streak=1,d=new Date(t);
        while(true){
            d.setDate(d.getDate()-1);
            var ds=d.toISOString().slice(0,10);
            if(data.checkInDates.indexOf(ds)!==-1)streak++;
            else break;
        }
        data.streakDays=streak;
        await saveData();
    }
}

function shuffleArr(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;}return r;}

// === Study ===
function startStudy(mode){
    if(words.length===0){document.getElementById('homeWord').textContent='词库加载中...';return}
    studyMode=mode;index=0;
    if(mode==='bookmark'){
        var bs=data.bookmarks||[];
        bookmarkWords=[];
        for(var i=0;i<bs.length;i++){
            var w=wordIndex&&wordIndex[bs[i]];if(w)bookmarkWords.push(w);
        }
        if(bookmarkWords.length===0)return;
        index=(data.progress||{}).bookmarkIndex||0;
    }else if(mode==='shuffle'){
        var p=data.progress||{orderIndex:0,shuffleIndex:0,shuffleOrder:[]};
        if(p.shuffleOrder&&p.shuffleOrder.length===words.length)shuffled=p.shuffleOrder.slice();
        else shuffled=shuffleArr(words);
        index=p.shuffleIndex||0;
    }else{
        index=(data.progress||{}).orderIndex||0;
    }
    if(index>=currentStudyList().length)index=0;
    showStudyWord();switchPage('study');
    if(settings.ttsEnabled)speakWord();
}

function currentStudyList(){
    if(studyMode==='bookmark')return bookmarkWords;
    return studyMode==='order'?ordered:shuffled;
}

function showStudyWord(){
    var list=currentStudyList();if(list.length===0)return;
    var w=list[index];
    document.getElementById('studyWord').textContent=w.word;
    document.getElementById('studyPos').textContent=w.pos;
    document.getElementById('studyMeaning').textContent=w.meaning;
    var ph=w.ukphone||'';
    document.getElementById('studyPhonetic').textContent=ph?'/'+ph.replace(/'/g,'')+'/':'';
    updateBookmarkBtn();
}

function updateBookmarkBtn(){
    var fav=false;
    if(studyMode==='bookmark'){fav=true}
    else{var list=currentStudyList();if(list.length>0){var bs=data.bookmarks||[];fav=bs.indexOf(list[index].word)!==-1}}
    var tb=document.getElementById('bookmarkBtn'),fb=document.getElementById('favBtn');
    if(fav){tb.textContent='已收藏';tb.classList.add('bookmarked');fb.classList.add('fav')}
    else{tb.textContent='收藏';tb.classList.remove('bookmarked');fb.classList.remove('fav')}
}

async function toggleBookmark(){
    if(studyMode==='bookmark')return;
    var list=currentStudyList();if(list.length===0)return;
    var w=list[index].word,bs=data.bookmarks||[],idx=bs.indexOf(w);
    if(idx===-1)bs.push(w);else bs.splice(idx,1);
    data.bookmarks=bs;await saveData();

    fb.classList.remove('pop');void fb.offsetWidth;fb.classList.add('pop');
}

function vibrate(){if(navigator.vibrate)try{navigator.vibrate(10)}catch(e){}}

var prevWordBusy=false;

function prevWord(){
    if(prevWordBusy)return;prevWordBusy=true;
    try{
    var list=currentStudyList();if(list.length===0){prevWordBusy=false;return}
    if(index>0)index--;else index=list.length-1;
    if(studyMode!=='bookmark'){saveProgress();saveData()}
    showStudyWord();if(settings.ttsEnabled)speakWord();
    var el=document.getElementById('studyWord');
    el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');
    }catch(e){console.warn('prevWord error:',e)}
    prevWordBusy=false;
}

var nextWordBusy=false;

async function nextWord(){
    if(nextWordBusy)return;nextWordBusy=true;
    try{
    vibrate();
    var el=document.getElementById('studyWord');
    el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');
    var list=currentStudyList();if(list.length===0){nextWordBusy=false;return}
    index++;
    if(index>=list.length){
        if(studyMode!=='bookmark'){
            data.rounds=(data.rounds||0)+1;
            var cmode=getModeLabel();
            document.getElementById('completeText').textContent='完成一轮 '+cmode+'刷词！';
            document.getElementById('completeSub').textContent='累计完成 '+data.rounds+' 轮';
            document.getElementById('completeModal').classList.add('show');
        }else{
            document.getElementById('completeText').textContent='生词本刷完！';
            document.getElementById('completeSub').textContent='共 '+list.length+' 个单词';
            document.getElementById('completeModal').classList.add('show');
        }
        index=0;
        if(studyMode!=='bookmark'){saveProgress();await saveData();}
        showStudyWord();if(settings.ttsEnabled)speakWord();
        updateMyPage();
        nextWordBusy=false;
        return;
    }
    if(studyMode!=='bookmark'){
        await checkNewDay();
        data.todaySwiped++;data.totalSwiped++;
        if(studyMode==='order')data.orderSwiped++;
        else if(studyMode==='shuffle')data.shuffleSwiped++;
        saveProgress();
        await saveData();
        if(data.todaySwiped>=settings.dailyGoal)await onGoalMet();
    }
    updateMyPage();
    showStudyWord();if(settings.ttsEnabled)speakWord();
    }catch(e){console.warn('nextWord error:',e)}
    nextWordBusy=false;
}

function getModeLabel(){return studyMode==='order'?'顺序':'乱序'}

function saveProgress(){
    var p=data.progress||{orderIndex:0,shuffleIndex:0,shuffleOrder:[]};
    if(studyMode==='bookmark'){p.bookmarkIndex=index;data.progress=p;return}
    if(studyMode==='order')p.orderIndex=index;
    else{p.shuffleIndex=index;p.shuffleOrder=shuffled.slice();}
    data.progress=p;
}

function speakWord(){
    var list=currentStudyList();if(list.length===0)return;
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(list[index].word);
    u.lang='en-US';u.rate=0.85;
    window.speechSynthesis.speak(u);
}

    startDate.setDate(today.getDate()-27);startDate.setDate(startDate.getDate()-startDate.getDay());
    var d=new Date(startDate),checkSet={};
    (data.checkInDates||[]).forEach(function(ds){checkSet[ds]=true});

var goalValues=[];

function renderGoalPicker(containerId,optionsId,activeVal){
    var html='';
    for(var i=0;i<goalValues.length;i++)html+='<div class="goal-option" data-val="'+goalValues[i]+'">'+goalValues[i]+'</div>';
    document.getElementById(optionsId).innerHTML=html;
    var container=document.getElementById(containerId);
    setGoalPickerPos(container,optionsId,activeVal||settings.dailyGoal||50);
}

function setGoalPickerPos(container,optionsId,val){
    var idx=goalValues.indexOf(val);if(idx<0)idx=9;
    var y=50-idx*50;
    document.getElementById(optionsId).style.transform='translateY('+y+'px)';
    var opts=document.getElementById(optionsId).querySelectorAll('.goal-option');
    opts.forEach(function(o){o.classList.toggle('active',parseInt(o.dataset.val)===val)});
}

function bindGoalPicker(containerId,optionsId,onChange){
    var c=document.getElementById(containerId),dragging=false;
    function getClientY(e){return e.touches?e.touches[0].clientY:e.clientY}
    function onStart(e){
        e.preventDefault();dragging=true;
        c._startY=getClientY(e);
        var t=c.querySelector('.goal-options').style.transform;
        c._startPos=parseInt((t.match(/-?\d+/)||[0])[0]);
    }
    function onMove(e){
        if(!dragging)return;e.preventDefault();
        var dy=getClientY(e)-c._startY,newY=c._startPos+dy;
        var maxY=50,minY=50-(goalValues.length-1)*50;
        newY=Math.max(minY,Math.min(maxY,newY));
        c.querySelector('.goal-options').style.transform='translateY('+newY+'px)';
    }
    function onEnd(e){
        if(!dragging)return;dragging=false;
        var t=c.querySelector('.goal-options').style.transform;
        var y=parseInt((t.match(/-?\d+/)||[0])[0]);
        var idx=Math.round((50-y)/50);
        idx=Math.max(0,Math.min(goalValues.length-1,idx));
        var val=goalValues[idx];
        setGoalPickerPos(c,optionsId,val);
        if(onChange)onChange(val);
    }
    c.addEventListener('touchstart',onStart,{passive:false});
    c.addEventListener('touchmove',onMove,{passive:false});
    c.addEventListener('touchend',onEnd);
    c.addEventListener('mousedown',onStart);
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onEnd);
}

var spTouchStartX=0,spTouchStartY=0,spTouchTime=0,spTouchMoved=false,spTouchActive=false;
document.getElementById('study-page').addEventListener('touchstart',function(e){
    if(e.target.closest('button'))return;
    spTouchActive=true;spTouchMoved=false;
    var t=e.touches[0];
    spTouchStartX=t.clientX;spTouchStartY=t.clientY;spTouchTime=Date.now();
},{passive:true});
document.getElementById('study-page').addEventListener('touchmove',function(e){spTouchMoved=true},{passive:true});
document.getElementById('study-page').addEventListener('touchend',function(e){
    if(!spTouchActive)return;
    if(e.target.closest('button')){spTouchActive=false;return}
    var t=e.changedTouches[0],dx=t.clientX-spTouchStartX,dy=t.clientY-spTouchStartY;
    var absDx=Math.abs(dx),absDy=Math.abs(dy),dt=Date.now()-spTouchTime;

    if(!spTouchMoved&&dt<300&&absDx<15&&absDy<15){
        if(t.clientX<window.innerWidth/2)prevWord();else nextWord();
    }else if(Math.max(absDx,absDy)>30){
        if(absDx>absDy){
            if(dx<0)nextWord();
            else if(spTouchStartX>15)prevWord();
        }else if(dy<0)toggleBookmark();
    }
    setTimeout(function(){spTouchActive=false},50);
});

    var checkSet={};(data.checkInDates||[]).forEach(function(ds){checkSet[ds]=true});
    var today=new Date(),ts=today.toISOString().slice(0,10);
    var fd=new Date(calYear,calMonth,1),sd=new Date(fd);sd.setDate(1-fd.getDay());
    var labels=['日','一','二','三','四','五','六'],html='';
    for(var i=0;i<7;i++)html+='<div class="cal-full-label">'+labels[i]+'</div>';
    var d=new Date(sd);
    for(var r=0;r<6;r++)for(var c=0;c<7;c++){
        var ds=d.toISOString().slice(0,10),isTM=d.getMonth()===calMonth;
        if(!isTM)html+='<div class="cal-full-day other-month">'+d.getDate()+'</div>';
        else{var cls='cal-full-day';if(checkSet[ds])cls+=' checked';if(ds===ts)cls+=' today';html+='<div class="'+cls+'">'+d.getDate()+'</div>'}
        d.setDate(d.getDate()+1);
    }
    document.getElementById('calFullGrid').innerHTML=html;
}

// === Username ===
function validateUsername(u){return /^[\u4e00-\u9fffa-zA-Z]{2,10}$/.test(u)}

document.getElementById('usernameConfirm').addEventListener('click',async function(){
    var u=document.getElementById('usernameInput').value.trim();
    if(!validateUsername(u)){
        document.getElementById('usernameError').textContent='仅支持中文和英文，2-10个字符';
        return;
    }
    document.getElementById('usernameError').textContent='';
    document.getElementById('usernameModal').classList.remove('show');
    username=u;data=defaultData();settings=defaultSettings();
    currentBank='cet4';
    document.getElementById('myUsername').textContent=u;
    renderBankSelector('cet4');
    document.getElementById('bankSelectModal').classList.add('show');
});

document.getElementById('usernameInput').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('usernameConfirm').click()});

// === Bank selector ===
function bankSelected(bank){
    var ops=document.getElementById('bankOptions').querySelectorAll('.modal-option');
    ops.forEach(function(o){o.classList.toggle('selected',o.dataset.bank===bank)});
    pendingBank=bank;
}

function renderBankSelector(defaultBank){
    var html='',banks=Object.keys(BANKS);
    for(var i=0;i<banks.length;i++){
        var b=banks[i],sel=b===defaultBank?' selected':'';
        html+='<button class="modal-option'+sel+'" data-bank="'+b+'">'+BANKS[b].name+'</button>';
    }
    document.getElementById('bankOptions').innerHTML=html;
    pendingBank=defaultBank;
    document.getElementById('bankOptions').querySelectorAll('.modal-option').forEach(function(btn){
        btn.addEventListener('click',function(){bankSelected(this.dataset.bank)});
    });
}

async function switchBank(bank){
    if(bank===currentBank&&words.length>0)return;
    try{await saveData()}catch(e){}
    switchPage('home');
    currentBank=bank;
    await saveProfile();
    index=0;shuffled=[];bookmarkWords=[];studyMode='order';
    data=(await dbGet('data',dataKey()))||defaultData();
    var s=(await dbGet('settings',settingsKey()))||defaultSettings();
    for(var k in s)settings[k]=s[k];
    await loadWords(bank);
    await checkNewDay();
    updateMyPage();showHomeWord();
}

document.getElementById('bankSelectConfirm').addEventListener('click',async function(){
    var bank=pendingBank||'cet4';
    document.getElementById('bankSelectModal').classList.remove('show');
    if(!uid){
        uid=generateUID();currentBank=bank;
        try{await saveProfile();await saveData();await saveSettings();await loadWords(bank)}catch(e){}
        document.getElementById('myUsername').textContent=username;
        if(!settings.goalSet)document.getElementById('goalModal').classList.add('show');
        else updateMyPage();
    }else{
        await switchBank(bank);
    }
});

document.getElementById('bankSelectModal').addEventListener('click',function(e){
    if(e.target===this){
        if(!uid)return; // 新用户不允许跳过词库选择
        this.classList.remove('show');
    }
});

document.getElementById('bankTitle').addEventListener('click',function(){
    renderBankSelector(currentBank);
    document.getElementById('bankSelectModal').classList.add('show');
});

// === Init ===
async function init(){
    await openDB();
    await migrateV1toV2();
    await loadAll();
    await migrateKeys();
    await loadWords(currentBank);

    localStorage.removeItem('cet4_study_data');

    isInitialized=true;

    if(uid){
        document.getElementById('myUsername').textContent=username;
        await checkNewDay();
        if(words.length>0)showHomeWord();
        updateMyPage();
    }else{
        document.getElementById('usernameModal').classList.add('show');
    }

    var theme=settings.theme;
    if(!theme){
        theme=await dbGet('settings','theme:'+uid);
        if(!theme){
            theme=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
            themeExplicitlySet=false;
        }else{
            themeExplicitlySet=true;
        }
        settings.theme=theme;
    }else{
        themeExplicitlySet=true;
    }
    if(theme==='dark'){
        document.documentElement.classList.add('dark');
        document.getElementById('themeBtn').textContent='浅色';
    }else{
        document.documentElement.classList.remove('dark');
        document.getElementById('themeBtn').textContent='深色';
    }
    window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(e){
        if(themeExplicitlySet)return;
        if(e.matches){document.documentElement.classList.add('dark');document.getElementById('themeBtn').textContent='浅色'}
        else{document.documentElement.classList.remove('dark');document.getElementById('themeBtn').textContent='深色'}
    });
}

init();
})();
</script>
